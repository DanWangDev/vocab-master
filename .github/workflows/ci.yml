name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            vocab-master/package-lock.json
            vocab-master/backend/package-lock.json
      - name: Install frontend dependencies
        working-directory: vocab-master
        run: npm ci
      - name: Install backend dependencies
        working-directory: vocab-master/backend
        run: npm ci
      - name: TypeScript check (frontend)
        working-directory: vocab-master
        run: npx tsc --noEmit -p tsconfig.app.json
      - name: TypeScript check (backend)
        working-directory: vocab-master/backend
        run: npx tsc --noEmit
      - name: ESLint
        working-directory: vocab-master
        continue-on-error: true
        run: npx eslint src/

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: vocab-master/backend/package-lock.json
      - name: Install dependencies
        working-directory: vocab-master/backend
        run: npm ci
      - name: Run tests
        working-directory: vocab-master/backend
        run: npm test
      - name: Run coverage
        working-directory: vocab-master/backend
        run: npm run test:coverage

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: vocab-master/package-lock.json
      - name: Install dependencies
        working-directory: vocab-master
        run: npm ci
      - name: Run tests
        working-directory: vocab-master
        run: npm test
      - name: Run coverage
        working-directory: vocab-master
        run: npm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            vocab-master/package-lock.json
            vocab-master/backend/package-lock.json
      - name: Install frontend dependencies
        working-directory: vocab-master
        run: npm ci
      - name: Build frontend
        working-directory: vocab-master
        run: npm run build
      - name: Install backend dependencies
        working-directory: vocab-master/backend
        run: npm ci
      - name: Build backend
        working-directory: vocab-master/backend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker images
        working-directory: vocab-master
        run: docker compose build
